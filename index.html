<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#5a0302">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Koi Resto Bar – TapQR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;900&family=Allan:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="home.css">
</head>

<body>

  <div class="phone-shell">
    <div class="phone-frame">

      <!-- ══════════ SPLASH SCREEN ══════════ -->
      <div id="splash" class="screen active">
        <div id="splash-inner" style="width:100%;height:100%;background:#5a0302;overflow:hidden;position:relative;">

          <img class="sp-bg-texture" src="https://www.figma.com/api/mcp/asset/289fe097-4460-484e-85a3-0e2bd6d64606"
            alt="" draggable="false">
          <div class="sp-glow"></div>
          <div class="sp-logo-shadow"></div>

          <!-- Top-right ornament -->
          <img class="sp-deco sp-deco-orn" style="right:-37px;top:-124px;width:232px;height:232px;opacity:0.5;"
            src="https://www.figma.com/api/mcp/asset/aad31e6c-3c0a-48a9-bdaa-34e09da4c984" alt="" draggable="false">
          <!-- Large plum flower -->
          <img class="sp-deco sp-deco-flower1" style="left:67px;top:41px;width:54px;height:53px;"
            src="https://www.figma.com/api/mcp/asset/370125c1-a15f-4b5b-a390-386d904d64bb" alt="" draggable="false">
          <!-- Small flower -->
          <img class="sp-deco sp-deco-flower2" style="left:136px;top:71px;width:26px;height:25px;"
            src="https://www.figma.com/api/mcp/asset/7d394fa6-fb60-4550-83ba-f44ee5730f8b" alt="" draggable="false">
          <!-- Dots -->
          <img class="sp-deco sp-deco-dot1" style="left:86px;top:401px;width:14px;height:14px;"
            src="https://www.figma.com/api/mcp/asset/96b83db9-6125-4f70-9d10-6a0a0dc584eb" alt="" draggable="false">
          <img class="sp-deco sp-deco-dot2" style="left:317px;top:314px;width:7px;height:7px;"
            src="https://www.figma.com/api/mcp/asset/9a6a3c67-93b3-45e8-8086-b675663f10fb" alt="" draggable="false">
          <img class="sp-deco sp-deco-dot3" style="left:67px;top:289px;width:7px;height:7px;"
            src="https://www.figma.com/api/mcp/asset/02c74a17-e418-4bee-a3ca-7da7ce71a32e" alt="" draggable="false">

          <!-- KOI logo -->
          <img class="sp-koi-logo" src="Images/logo_koi.png" alt="Koi – Flavour & Flow" draggable="false">

          <!-- Bottom wave -->
          <img class="sp-deco" style="left:-24px;bottom:0;width:452px;height:193px;opacity:0.4;"
            src="https://www.figma.com/api/mcp/asset/7960ee10-e376-465e-ad34-40920988e7ef" alt="" draggable="false">

          <!-- Text -->
          <div class="sp-text">
            <span class="sp-name">Koi Resto Bar</span>
            <span class="sp-loc">Mathikere, Bengaluru</span>
          </div>

          <!-- CTA -->
          <button class="sp-cta" id="exploreBtn">
            <img src="https://www.figma.com/api/mcp/asset/2d513f84-e114-4773-8b48-4446fc7a7a5c" alt=""
              draggable="false">
            <span>Explore our menu</span>
          </button>

          <!-- Footer -->
          <div class="sp-footer">
            <div class="sp-powered">
              <span class="sp-powered-label">Powered by</span>
              <span class="sp-tapqr">Ta<span class="p">p</span><span class="Q">Q</span><span class="R">R</span></span>
            </div>
            <span class="sp-website">www.tapqr.com</span>
          </div>

        </div>
      </div>

    </div><!-- phone-frame -->
  </div><!-- phone-shell -->

  <script>
    // ── NAVIGATION ──
    document.getElementById('exploreBtn')?.addEventListener('click', function (e) {
      e.preventDefault();
      const btn = this;

      // Haptic feedback (supported on most mobile devices)
      if (typeof navigator.vibrate === 'function') {
        navigator.vibrate(50);
      }

      // Small scale effect
      btn.style.transform = 'translateX(-50%) scale(0.92)';

      // Wait 150ms to let the effect and haptic play before navigating
      setTimeout(() => {
        btn.style.transform = ''; // Restore transform
        window.location.href = 'home.html';
      }, 150);
    });

    // ── FALLBACK: hide broken images gracefully ──
    document.querySelectorAll('img').forEach(img => {
      img.addEventListener('error', function () { this.style.opacity = '0'; });
    });
  </script>

</body>

</html>
