<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>3D Menu – AR View</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root { --font-main: 'Figtree', sans-serif; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: var(--font-main);
    overflow: hidden;
  }

  .screen {
    max-width: 390px; margin: 0 auto;
    height: 100vh; height: 100dvh;
    position: relative; overflow: hidden;
    background: #111;
  }

  /* ── CAMERA FEED ── */
  .camera-feed {
    position: absolute; inset: 0;
    background: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
  }

  video#cameraStream {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror for selfie, disable for back */
  }

  /* Simulated camera background when no permission */
  .camera-placeholder {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
    animation: subtle-shift 8s ease-in-out infinite;
  }
  .camera-placeholder::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 300px 200px at 30% 60%, rgba(255,255,255,0.03) 0%, transparent 70%),
      radial-gradient(ellipse 200px 150px at 70% 40%, rgba(255,255,255,0.02) 0%, transparent 70%);
  }
  @keyframes subtle-shift {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.1); }
  }

  /* ── AR GRID OVERLAY ── */
  .ar-grid {
    position: absolute; inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .ar-grid.visible { opacity: 1; }

  /* ── SURFACE PLANE INDICATOR ── */
  .surface-plane {
    position: absolute;
    bottom: 28%; left: 50%; transform: translateX(-50%);
    width: 260px; height: 130px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: plane-pulse 2s ease-in-out infinite;
    pointer-events: none;
  }
  .surface-plane::before {
    content: '';
    position: absolute; inset: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
  }
  @keyframes plane-pulse {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) scaleX(1); }
    50% { opacity: 1; transform: translateX(-50%) scaleX(1.05); }
  }
  .surface-label {
    font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6);
    letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── AR DISH MODEL ── */
  .ar-dish-wrapper {
    position: absolute;
    bottom: 32%; left: 50%; transform: translateX(-50%);
    width: 280px; height: 280px;
    display: flex; align-items: flex-end; justify-content: center;
    pointer-events: none;
    transition: bottom 0.3s;
  }
  .ar-dish-shadow {
    position: absolute; bottom: -10px;
    width: 200px; height: 40px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
    border-radius: 50%;
  }
  .ar-dish-img {
    width: 240px; height: 240px;
    object-fit: contain;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
    animation: ar-float 3s ease-in-out infinite;
  }
  @keyframes ar-float {
    0%, 100% { transform: translateY(0px) rotate3d(0,1,0,0deg); }
    33% { transform: translateY(-6px) rotate3d(0,1,0,2deg); }
    66% { transform: translateY(-3px) rotate3d(0,1,0,-1deg); }
  }

  /* ── SCANNING ANIMATION ── */
  .scan-line {
    position: absolute; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,210,255,0.8), transparent);
    animation: scan 2s linear infinite;
    pointer-events: none;
    display: none;
  }
  .scan-line.active { display: block; }
  @keyframes scan {
    0% { top: 20%; opacity: 1; }
    80% { top: 80%; opacity: 1; }
    100% { top: 80%; opacity: 0; }
  }

  /* ── HUD CORNERS ── */
  .hud-corners {
    position: absolute; inset: 50px;
    pointer-events: none;
  }
  .corner {
    position: absolute; width: 20px; height: 20px;
    border-color: rgba(255,255,255,0.5);
    border-style: solid;
    border-width: 0;
  }
  .corner-tl { top: 0; left: 0; border-top-width: 2px; border-left-width: 2px; }
  .corner-tr { top: 0; right: 0; border-top-width: 2px; border-right-width: 2px; }
  .corner-bl { bottom: 0; left: 0; border-bottom-width: 2px; border-left-width: 2px; }
  .corner-br { bottom: 0; right: 0; border-bottom-width: 2px; border-right-width: 2px; }

  /* ── TOP TOOLBAR ── */
  .top-toolbar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 50px 20px 16px;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    z-index: 20;
  }
  .ar-back-btn {
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 32px;
    padding: 10px 20px 10px 14px;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; text-decoration: none;
  }
  .ar-back-btn span { font-size: 11px; font-weight: 600; color: #fff; letter-spacing: 0.66px; text-transform: uppercase; }
  .ar-title {
    position: absolute; left: 50%; top: 50px; transform: translateX(-50%);
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.8);
    letter-spacing: 1px; text-transform: uppercase;
    white-space: nowrap;
  }
  .ar-top-actions { display: flex; gap: 10px; }
  .ar-top-btn {
    width: 40px; height: 40px;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff;
  }
  .ar-top-btn svg { width: 18px; height: 18px; }

  /* ── DISH INFO CARD ── */
  .dish-info-card {
    position: absolute;
    bottom: 140px; left: 20px; right: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 20;
  }
  .dic-left {}
  .dic-name { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .dic-sub { font-size: 13px; color: rgba(255,255,255,0.6); }
  .dic-price { font-size: 24px; font-weight: 700; color: #fff; }

  /* ── BOTTOM CONTROLS ── */
  .bottom-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 20px 40px;
    background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
    display: flex; flex-direction: column; gap: 16px;
    z-index: 20;
  }

  /* Size controls */
  .size-controls {
    display: flex; align-items: center; justify-content: center; gap: 16px;
  }
  .size-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; font-size: 22px; font-weight: 300;
    transition: background 0.2s;
  }
  .size-btn:active { background: rgba(255,255,255,0.25); }
  .size-label {
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7);
    letter-spacing: 0.5px; text-transform: uppercase; width: 60px; text-align: center;
  }

  /* Action Row */
  .action-row { display: flex; gap: 12px; align-items: center; }

  .capture-btn {
    flex: 1;
    height: 54px;
    background: #fff;
    border-radius: 54px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    cursor: pointer; border: none;
    font-size: 16px; font-weight: 700; color: #000;
    transition: opacity 0.2s;
  }
  .capture-btn:active { opacity: 0.85; }

  .maximize-btn {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .maximize-btn:active { background: rgba(255,255,255,0.25); }
  .maximize-btn svg { width: 20px; height: 20px; }

  /* ── STATUS BAR ── */
  .status-bar {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 6px;
    z-index: 25; pointer-events: none;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00d084; animation: status-blink 2s ease-in-out infinite;
  }
  @keyframes status-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .status-text { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.8); letter-spacing: 0.5px; text-transform: uppercase; }

  /* ── MAXIMIZED STATE ── */
  .screen.maximized .dish-info-card { display: none; }
  .screen.maximized .bottom-controls { padding-bottom: 60px; }
  .screen.maximized .ar-dish-img { width: 300px; height: 300px; }
  .screen.maximized .surface-plane { width: 320px; height: 160px; }

  /* ── CAMERA PERMISSION ── */
  .camera-permission-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    z-index: 50;
    padding: 40px;
  }
  .cam-icon { font-size: 48px; }
  .cam-title { font-size: 20px; font-weight: 700; color: #fff; text-align: center; }
  .cam-sub { font-size: 14px; color: rgba(255,255,255,0.6); text-align: center; line-height: 1.5; }
  .cam-allow-btn {
    background: #fff; color: #000;
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 16px; font-weight: 700;
    border: none; cursor: pointer;
    width: 100%;
    transition: opacity 0.2s;
  }
  .cam-allow-btn:active { opacity: 0.85; }
  .cam-skip-btn {
    background: transparent; color: rgba(255,255,255,0.5);
    border: none; font-size: 14px; cursor: pointer;
    padding: 8px;
  }
</style>
</head>
<body>
<div class="screen" id="arScreen">

  <!-- Camera Permission Overlay -->
  <div class="camera-permission-overlay" id="permOverlay">
    <div class="cam-icon">📷</div>
    <div class="cam-title">Camera Access Needed</div>
    <div class="cam-sub">Allow camera access to place the dish on your actual table using AR</div>
    <button class="cam-allow-btn" onclick="requestCamera()">Allow Camera</button>
    <button class="cam-skip-btn" onclick="skipCamera()">Use Demo Mode</button>
  </div>

  <!-- Camera Feed / Placeholder -->
  <div class="camera-feed">
    <div class="camera-placeholder" id="camPlaceholder"></div>
    <video id="cameraStream" autoplay playsinline muted style="display:none;transform:scaleX(1);"></video>
  </div>

  <!-- AR Grid -->
  <div class="ar-grid" id="arGrid"></div>

  <!-- Scan Line -->
  <div class="scan-line" id="scanLine"></div>

  <!-- HUD Corners -->
  <div class="hud-corners">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
  </div>

  <!-- Surface Plane -->
  <div class="surface-plane" id="surfacePlane" style="display:none;">
    <span class="surface-label">Surface detected</span>
  </div>

  <!-- AR Dish -->
  <div class="ar-dish-wrapper" id="arDishWrapper" style="display:none;">
    <div class="ar-dish-shadow"></div>
    <img
      class="ar-dish-img"
      id="arDishImg"
      src="https://www.figma.com/api/mcp/asset/db87d0bc-6ff1-48f1-9a88-0fc5d4091ffc"
      alt="Tandoori Chooza AR"
      draggable="false"
    />
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar" style="display:none;">
    <div class="status-dot"></div>
    <span class="status-text" id="statusText">AR Active</span>
  </div>

  <!-- Top Toolbar -->
  <div class="top-toolbar">
    <a class="ar-back-btn" href="dish-detail.html">
      <svg width="19" height="14" viewBox="0 0 19 14" fill="none">
        <path d="M18 7H2M2 7L8 1M2 7L8 13" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>BACK</span>
    </a>
    <div class="ar-title">AR View</div>
    <div class="ar-top-actions">
      <div class="ar-top-btn" onclick="toggleFlash()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 2L4.5 13.5H12L11 22L19.5 10.5H12L13 2z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="ar-top-btn" id="switchCamBtn" onclick="switchCamera()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7H4M4 7l4-4M4 7l4 4M4 17h16M16 17l4 4M16 17l4-4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Dish Info Card -->
  <div class="dish-info-card">
    <div class="dic-left">
      <div class="dic-name">Tandoori Chooza</div>
      <div class="dic-sub">Tap to move • Pinch to resize</div>
    </div>
    <div class="dic-price">₹300</div>
  </div>

  <!-- Bottom Controls -->
  <div class="bottom-controls">
    <!-- Size controls -->
    <div class="size-controls">
      <button class="size-btn" onclick="resizeDish(-1)">−</button>
      <span class="size-label" id="sizeLabel">1×</span>
      <button class="size-btn" onclick="resizeDish(1)">+</button>
    </div>

    <div class="action-row">
      <button class="capture-btn" onclick="capture()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="7" stroke="#000" stroke-width="2"/>
          <circle cx="10" cy="10" r="4" fill="#000"/>
        </svg>
        Capture
      </button>
      <button class="maximize-btn" id="maxBtn" onclick="toggleMaximize()">
        <svg viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.8">
          <path d="M3 8V3h5M17 8V3h-5M3 12v5h5M17 12v5h-5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  let stream = null;
  let facingMode = 'environment';
  let isMaximized = false;
  let dishScale = 1;
  let arReady = false;

  // AR Dish drag
  const arWrapper = document.getElementById('arDishWrapper');
  let arDragging = false;
  let arLastX = 0, arLastY = 0;
  let arPosX = 0; // offset from center in %

  async function requestCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
      });
      const video = document.getElementById('cameraStream');
      video.srcObject = stream;
      video.style.display = 'block';
      document.getElementById('camPlaceholder').style.display = 'none';
      startAR();
    } catch(e) {
      console.log('Camera not available:', e);
      skipCamera();
    }
    document.getElementById('permOverlay').style.display = 'none';
  }

  function skipCamera() {
    document.getElementById('permOverlay').style.display = 'none';
    startAR();
  }

  function startAR() {
    // Show scanning
    const scanLine = document.getElementById('scanLine');
    scanLine.classList.add('active');

    // After scan, show surface
    setTimeout(() => {
      scanLine.classList.remove('active');
      const surface = document.getElementById('surfacePlane');
      surface.style.display = 'flex';
      document.getElementById('arGrid').classList.add('visible');
    }, 1800);

    // Then show dish
    setTimeout(() => {
      document.getElementById('arDishWrapper').style.display = 'flex';
      document.getElementById('statusBar').style.display = 'flex';
      arReady = true;
    }, 2600);
  }

  // Dish drag on AR view
  const screen = document.getElementById('arScreen');
  let startPinchDist = 0;
  let startDishScale = 1;

  screen.addEventListener('touchstart', e => {
    if (!arReady) return;
    if (e.touches.length === 1) {
      arDragging = true;
      arLastX = e.touches[0].clientX;
      arLastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      startPinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      startDishScale = dishScale;
    }
  }, { passive: true });

  screen.addEventListener('touchmove', e => {
    if (!arReady) return;
    if (e.touches.length === 1 && arDragging) {
      const dx = e.touches[0].clientX - arLastX;
      const dy = e.touches[0].clientY - arLastY;
      const wrapper = document.getElementById('arDishWrapper');
      const rect = screen.getBoundingClientRect();
      const currentLeft = parseFloat(wrapper.style.left) || 50;
      const currentBottom = parseFloat(wrapper.style.bottom) || 32;
      const newLeft = Math.max(10, Math.min(90, currentLeft + (dx / rect.width) * 100));
      const newBottom = Math.max(15, Math.min(65, currentBottom - (dy / rect.height) * 100));
      wrapper.style.left = newLeft + '%';
      wrapper.style.bottom = newBottom + '%';
      wrapper.style.transform = 'translateX(-50%)';
      arLastX = e.touches[0].clientX;
      arLastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      dishScale = Math.max(0.4, Math.min(3.0, startDishScale * (dist / startPinchDist)));
      updateDishSize();
    }
  }, { passive: true });

  screen.addEventListener('touchend', () => { arDragging = false; });

  function resizeDish(dir) {
    dishScale = Math.max(0.4, Math.min(3.0, dishScale + dir * 0.2));
    updateDishSize();
  }

  function updateDishSize() {
    const sizeMultipliers = [0.4, 0.6, 0.8, 1.0, 1.25, 1.5, 2.0, 2.5, 3.0];
    const closest = sizeMultipliers.reduce((a,b) => Math.abs(b - dishScale) < Math.abs(a - dishScale) ? b : a);
    const label = closest <= 0.5 ? '0.5×' : closest <= 0.8 ? '0.75×' : closest <= 1.1 ? '1×' : closest <= 1.4 ? '1.25×' : closest <= 1.6 ? '1.5×' : '2×';
    document.getElementById('sizeLabel').textContent = label;
    const img = document.getElementById('arDishImg');
    const baseSize = 240;
    const newSize = baseSize * dishScale;
    img.style.width = newSize + 'px';
    img.style.height = newSize + 'px';
  }

  function toggleMaximize() {
    isMaximized = !isMaximized;
    const s = document.getElementById('arScreen');
    s.classList.toggle('maximized', isMaximized);
    const btn = document.getElementById('maxBtn');
    btn.innerHTML = isMaximized
      ? `<svg viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.8"><path d="M8 3v5H3M17 8h-5V3M3 12h5v5M12 17v-5h5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : `<svg viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.8"><path d="M3 8V3h5M17 8V3h-5M3 12v5h5M17 12v5h-5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  function capture() {
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:#fff;opacity:0.8;z-index:100;pointer-events:none;';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 300);
  }

  function switchCamera() {
    if (!stream) return;
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    stream.getTracks().forEach(t => t.stop());
    navigator.mediaDevices.getUserMedia({ video: { facingMode } }).then(s => {
      stream = s;
      const video = document.getElementById('cameraStream');
      video.srcObject = s;
      video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    }).catch(() => {});
  }

  function toggleFlash() { /* Flash toggle - device API if available */ }
</script>
</body>
</html>
