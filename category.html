<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>3D Menu – Starters</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&family=Allan:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="category.css">
</head>

<body>
  <div class="screen">

    <!-- Hero -->
    <div class="hero">
      <div class="hero-bg"></div>
      <div class="hero-overlay"></div>
      <div class="hero-blur"></div>

      <!-- Sticky nav overlay -->
      <div class="top-nav">
        <a class="back-btn" href="home.html">
          <img src="Images/back.svg" alt="menu" />
          <span>BACK</span>
        </a>
        <div class="nav-actions">
          <button class="nav-action-btn">
            <img src="Images/search.png" alt="menu" />
          </button>
          <button class="nav-action-btn">
            <img src="Images/cart.png" alt="menu" />
          </button>
        </div>
      </div>

      <div class="hero-center">
        <div class="category-heading">
          <div class="cat-icon-badge">
            <img src="Images/starters icon page.png" alt="starters" />
          </div>
          <div class="cat-heading-title">Starters</div>
        </div>
        <div class="hero-desc">Slow-boiled in rich Cajun butter with baby potatoes and herbs.</div>
        
        <!-- Main Category Carousel -->
        <div class="main-cat-carousel" id="main-cat-carousel">
          <!-- Populated by category-supabase.js -->
        </div>
      </div>
    </div>

    <!-- Content Panel -->
    <div class="sanju">
      <div class="content-panel">
        <!-- Dynamic Cuisine Tabs and Dish Carousel -->
        <div class="dish-section" style="padding-top: 24px;">
            <!-- Tab bar -->
            <div class="tab-bar">
                <div class="tab-active-bar"></div>
            </div>

            <!-- Dish Cards -->
            <div class="dish-grid-wrap">
                <div class="dish-grid">
                    <!-- Dish cards will be populated here by JavaScript -->
                </div><!-- end dish-grid -->
            </div><!-- end dish-grid-wrap -->
        </div><!-- end dish-section -->

        <!-- Footer -->
        <div class="footer">
          <div class="powered-by">Powered by</div>
          <div class="tapqr-logo">
            <div class="tapqr-line"></div>
            <div class="tapqr-text">Tap<strong>QR</strong></div>
            <div class="tapqr-line"></div>
          </div>
          <div class="tapqr-url">www.tapqr.com</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Scroll snap: after first scroll, white panel locks to top
    const panel = document.querySelector('.content-panel');
    const screen = document.querySelector('.screen');
    let snapped = false;

    window.addEventListener('scroll', () => {
      if (!snapped && window.scrollY > 20) {
        snapped = true;
        window.scrollTo({ top: 253, behavior: 'smooth' });
      }
    }, { passive: true });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="category-supabase.js"></script>
</body>

</html>
